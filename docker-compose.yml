services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      GROQ_API_KEY: ${GROQ_API_KEY:?Set GROQ_API_KEY in a .env file (see .env.example) or the environment}
      GROQ_MODEL: ${GROQ_MODEL:-}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      TAVILY_MAX_RESULTS: ${TAVILY_MAX_RESULTS:-}
      TAVILY_SEARCH_DEPTH: ${TAVILY_SEARCH_DEPTH:-}
